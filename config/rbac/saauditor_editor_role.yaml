# This rule is not used by the project my-crd-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the security.security.tokenguard.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: my-crd-operator
    app.kubernetes.io/managed-by: kustomize
  name: saauditor-editor-role
rules:
- apiGroups:
  - security.security.tokenguard.io
  resources:
  - saauditors
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - security.security.tokenguard.io
  resources:
  - saauditors/status
  verbs:
  - get
