# This rule is not used by the project my-crd-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over security.security.tokenguard.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: my-crd-operator
    app.kubernetes.io/managed-by: kustomize
  name: saauditor-admin-role
rules:
- apiGroups:
  - security.security.tokenguard.io
  resources:
  - saauditors
  verbs:
  - '*'
- apiGroups:
  - security.security.tokenguard.io
  resources:
  - saauditors/status
  verbs:
  - get
