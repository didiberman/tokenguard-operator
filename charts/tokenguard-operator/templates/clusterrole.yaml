apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tokenguard-operator.fullname" . }}-manager-role
  labels:
    {{- include "tokenguard-operator.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: [serviceaccounts]
  verbs: [get, list, watch]
- apiGroups: [rbac.authorization.k8s.io]
  resources: [clusterrolebindings, clusterroles, rolebindings, roles]
  verbs: [get, list, watch]
- apiGroups: [security.tokenguard.io]
  resources: [saauditors]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [security.tokenguard.io]
  resources: [saauditors/finalizers]
  verbs: [update]
- apiGroups: [security.tokenguard.io]
  resources: [saauditors/status]
  verbs: [get, patch, update]
