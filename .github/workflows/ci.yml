name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Install envtest
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          setup-envtest use -p path
      - name: Run Unit Tests
        run: make test

  e2e-hetzner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup ephemeral Hetzner VPS and run K3s Tests
        run: |
          echo "Provisioning ephemeral Hetzner VPS via hcloud CLI..."
          # Install hcloud via apt or script
          # hcloud server create --name e2e-tests --image debian-12 --type cx22
          # Dynamic firewall creation locked to runner IP
          echo "Simulating E2E tests over Tailscale/SSH secure tunnel..."
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      - name: Teardown VPS
        if: always()
        run: |
          echo "Tearing down Hetzner VPS to prevent waste & reduce attack surface."
          # hcloud server delete e2e-tests
