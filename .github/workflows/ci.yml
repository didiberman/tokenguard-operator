name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "PROJECT"
      - "AGENTS.md"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "PROJECT"
      - "AGENTS.md"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Install envtest
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          setup-envtest use -p path
      - name: Run Unit Tests
        run: make test

  e2e-hetzner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Hetzner CLI
        run: |
          curl -sL https://github.com/hetznercloud/cli/releases/download/v1.44.1/hcloud-linux-amd64.tar.gz | tar -xz
          sudo mv hcloud /usr/local/bin/
      - name: Setup ephemeral Hetzner VPS and run K3s Tests
        run: ./.github/scripts/hetzner-e2e.sh
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      - name: Teardown VPS
        if: always()
        run: ./.github/scripts/hetzner-teardown.sh
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
