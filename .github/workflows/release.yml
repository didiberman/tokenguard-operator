name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/token-guard:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/token-guard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: Package & Publish Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update chart appVersion to match tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/tokenguard-operator/Chart.yaml
          sed -i "s/^version:.*/version: ${VERSION}/" charts/tokenguard-operator/Chart.yaml

      - name: Lint Helm chart
        run: helm lint charts/tokenguard-operator

      - name: Package Helm chart
        run: helm package charts/tokenguard-operator --destination dist/

      - name: Push Helm chart to GHCR OCI
        run: |
          helm push dist/tokenguard-operator-*.tgz oci://ghcr.io/${{ github.repository }}/charts

      - name: Upload chart as release asset
        uses: softprops/action-gh-release@v1
        with:
          files: dist/tokenguard-operator-*.tgz

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, helm]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
