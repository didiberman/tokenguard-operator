name: Helm Chart Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Package & Push Helm Chart to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set version from tag
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update Chart version and appVersion
        run: |
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" charts/tokenguard-operator/Chart.yaml
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" charts/tokenguard-operator/Chart.yaml

      - name: Lint Helm chart
        run: helm lint charts/tokenguard-operator

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package charts/tokenguard-operator --destination dist/

      - name: Push Helm chart to GHCR OCI
        run: helm push dist/tokenguard-operator-*.tgz oci://ghcr.io/${{ github.repository }}/charts

      - name: Attach chart to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/tokenguard-operator-*.tgz
